
services:
  # PostgreSQL database (local alternative to Neon)
  postgres:   # service name, use in DATABASE_URL as hostname, e.g., postgresql://user:pass@postgres:5432/dbname
    # pgvector/pgvector:pg18 = Postgres 18 with the pgvector extension preinstalled
    # (plain postgres:18-alpine does NOT ship the extension files needed for `CREATE EXTENSION vector`)
    image: pgvector/pgvector:pg18
    # container_name: price-monitor-postgres  # Don't set container_name to allow multiple instances
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: priceMonitor
    ports:  # port mapping needed on localhost for local development
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run once, only when the data volume is first created (fresh DB).
      # On an existing volume, run `CREATE EXTENSION IF NOT EXISTS vector;` manually instead.
      - ./scripts/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (local alternative to Upstash)
  redis:  # service name, use in REDIS_URL as hostname, e.g., redis://redis:6379
    image: redis:8-alpine
    # container_name: price-monitor-redis  # Don't set container_name to allow multiple instances
    ports:  # port mapping needed on localhost for local development
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Worker application (use `docker compose --profile worker up -d` or `pnpm worker:up` to start)
  worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: development
      # Database - using local Postgres service name as host: postgresql://user:pw@host:5432/priceMonitor
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/priceMonitor
      # Redis - using local Redis service name as host: redis://host:6379
      REDIS_URL: redis://redis:6379
      # AI Provider (use your actual keys)
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-flash}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      FORCE_AI_EXTRACTION: ${FORCE_AI_EXTRACTION:-false}
      # Scheduler - enabled for background worker
      ENABLE_SCHEDULER: "true"
      # Auto-apply pending DB migrations on startup (same single gated instance)
      RUN_MIGRATIONS: "true"
      # Semantic search (feature 008): the reindex job POSTs here. Use the
      # mcp-server Docker service name, not localhost.
      MCP_REINDEX_URL: http://mcp-server:3002/internal/reindex
      # Timezone used by BullMQ repeatable cron jobs
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Pacific/Auckland}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-Price Monitor <onboarding@resend.dev>}
      ALERT_EMAIL: ${ALERT_EMAIL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # MCP server (use `docker compose --profile mcp up -d` or `pnpm mcp:up` to start)
  mcp-server:
    profiles:
      - mcp
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    ports:  # map host:container so the host-running web dev server can reach it
      - "3002:3002"
    environment:
      NODE_ENV: development
      # Database - using local Postgres service name as host: postgresql://user:pw@host:5432/priceMonitor
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/priceMonitor
      # Redis - using local Redis service name as host: redis://host:6379
      REDIS_URL: redis://redis:6379
      # Transport - HTTP mode for app-to-app runtime (stdio is reserved for IDE integration)
      # Port 3002 (not 3001) so we don't collide with the worker's health server on host
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3002"
      # Semantic search (feature 008): the mcp-server is the single embedding
      # authority. Weights are baked into the image at EMBEDDING_CACHE_DIR.
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-Xenova/all-MiniLM-L6-v2}
      EMBEDDING_CACHE_DIR: /app/.cache/transformers
      SEMANTIC_SEARCH_TOP_N: ${SEMANTIC_SEARCH_TOP_N:-5}
      SEMANTIC_SEARCH_MAX_DISTANCE: ${SEMANTIC_SEARCH_MAX_DISTANCE:-0.70}
      # Timezone used by any date-based tools
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Pacific/Auckland}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Note: For local development, run web app directly in another terminal:
  #   pnpm --filter @price-monitor/web dev
  # This is faster and simpler than Docker. Web app will connect to this local Redis/Postgres.

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
