  <rect width="1860" height="920" fill="url(#bg)"/>

  <!-- Title -->
  <text x="50" y="62" font-size="30" font-weight="700" fill="#F8FAFC">Price Monitoring Agent <tspan font-size="17" font-weight="600" fill="#A78BFA">· Phase 4</tspan></text>
  <text x="50" y="90" font-size="14" fill="#94A3B8">System architecture — AI price tracking, event-driven processing, MCP chat &#38; semantic product search (RAG via pgvector + local embeddings)</text>

  <!-- ======================= PANELS ======================= -->
  <!-- Client -->
  <rect x="40" y="330" width="215" height="230" rx="20" fill="#111A2B" stroke="#1F2B40" stroke-width="1.5"/>
  <text x="62" y="362" font-size="12.5" font-weight="700" letter-spacing="2.5" fill="#22D3EE">CLIENT</text>

  <!-- Web app -->
