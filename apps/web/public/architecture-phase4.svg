  </g>
  <text x="386" y="496" font-size="16" font-weight="600" fill="#F1F5F9">AI Chat Page</text>
  <text x="350" y="526" font-size="12" fill="#94A3B8">streaming /api/chat · tool-calling loop</text>
  <text x="350" y="546" font-size="12" fill="#94A3B8">step budget · timeouts · guardrails</text>
