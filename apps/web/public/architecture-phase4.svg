  <text x="330" y="186" font-size="12.5" font-weight="700" letter-spacing="2.5" fill="#60A5FA">WEB APP</text>
  <text x="330" y="206" font-size="11.5" fill="#64748B">Next.js 16 · full-stack layer</text>

  <!-- Data layer -->
  <rect x="720" y="150" width="360" height="590" rx="20" fill="#111A2B" stroke="#1F2B40" stroke-width="1.5"/>
  <text x="750" y="186" font-size="12.5" font-weight="700" letter-spacing="2.5" fill="#34D399">DATA LAYER</text>
  <text x="750" y="206" font-size="11.5" fill="#64748B">PostgreSQL 18 + pgvector · Redis 8</text>

  <!-- Backend services -->
