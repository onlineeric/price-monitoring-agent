<svg xmlns="http://www.w3.org/2000/svg" width="1860" height="920" viewBox="0 0 1860 920" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1626"/>
      <stop offset="1" stop-color="#0A0F1B"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E2A40"/>
      <stop offset="1" stop-color="#15202F"/>
