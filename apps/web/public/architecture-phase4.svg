  <text x="1810" y="884" font-size="11" fill="#475569" text-anchor="end">Next.js 16 · React 19 · TypeScript · Drizzle ORM · BullMQ · Playwright · Vercel AI SDK · MCP · pgvector · Transformers.js · Resend</text>
