  <text x="1155" y="186" font-size="12.5" font-weight="700" letter-spacing="2.5" fill="#A78BFA">BACKEND SERVICES</text>
  <text x="1155" y="206" font-size="11.5" fill="#64748B">worker · MCP server (embedding authority)</text>

  <!-- External -->
  <rect x="1560" y="150" width="250" height="590" rx="20" fill="#111A2B" stroke="#1F2B40" stroke-width="1.5"/>
  <text x="1580" y="186" font-size="12.5" font-weight="700" letter-spacing="2.5" fill="#FBBF24">EXTERNAL</text>
  <text x="1580" y="206" font-size="11.5" fill="#64748B">third-party services</text>

